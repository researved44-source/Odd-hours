<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odd Hours — Order Food</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0B0E14;
    --surface: #151922;
    --surface-2: #1C212C;
    --amber: #FF8A3D;
    --cyan: #4DE8FF;
    --text: #F5F2EA;
    --muted: #8B93A7;
    --line: #262C38;
  }
  *{ box-sizing: border-box; }
  body{ margin:0; }
  html{ scroll-behavior: smooth; }
  body{
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    padding-bottom: 90px;
  }
  .mono{ font-family: 'JetBrains Mono', monospace; }
  a{ color: inherit; }

  /* Header */
  header{
    position: sticky; top:0; z-index: 20;
    background: rgba(11,14,20,0.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between;
    padding: 14px 20px;
  }
  .brand{
    font-family:'Anton', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    color: var(--amber);
  }
  .clock{
    font-size: 13px;
    color: var(--cyan);
    letter-spacing: 1px;
  }
  .cart-btn{
    background: var(--surface-2);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 999px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    cursor: pointer;
    display:flex; align-items:center; gap:8px;
  }
  .cart-btn:focus-visible, button:focus-visible, .qty button:focus-visible{
    outline: 2px solid var(--cyan); outline-offset: 2px;
  }
  .cart-dot{
    background: var(--amber); color:#0B0E14; font-weight:700;
    border-radius:999px; min-width:20px; height:20px;
    display:flex; align-items:center; justify-content:center;
    font-size: 11px; padding: 0 5px;
  }

  /* Hero */
  .hero{
    text-align:center;
    padding: 56px 20px 40px;
    border-bottom: 1px solid var(--line);
  }
  .hero h1{
    font-family:'Anton', sans-serif;
    font-size: clamp(48px, 12vw, 88px);
    margin: 0;
    line-height: 0.95;
    color: var(--amber);
    text-shadow:
      0 0 6px rgba(255,138,61,0.7),
      0 0 22px rgba(255,138,61,0.4),
      0 0 46px rgba(255,138,61,0.2);
    animation: flicker 5s infinite;
  }
  @media (prefers-reduced-motion: reduce){ .hero h1{ animation: none; } }
  @keyframes flicker{
    0%, 19%, 21%, 23%, 54%, 56%, 100% { opacity: 1; }
    20%, 22%, 55% { opacity: 0.72; }
  }
  .hero .tag{
    color: var(--muted);
    font-size: 15px;
    margin-top: 10px;
    letter-spacing: 0.3px;
  }
  .greeting{
    display:inline-block;
    margin-top: 18px;
    padding: 8px 16px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: var(--surface);
    color: var(--cyan);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
  }

  /* Menu */
  .menu{ padding: 32px 20px 0; max-width: 720px; margin: 0 auto; }
  .menu h2{
    font-family:'Anton', sans-serif;
    font-size: 18px;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin: 0 0 16px 4px;
  }
  .grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
  }
  .card{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px;
    display:flex;
    flex-direction:column;
    gap: 10px;
  }
  .card .emoji{ font-size: 30px; }
  .card .name{ font-weight: 700; font-size: 15px; }
  .card .price{
    font-family:'JetBrains Mono', monospace;
    color: var(--amber);
    font-size: 14px;
  }
  .qty{
    margin-top: auto;
    display:flex; align-items:center; justify-content:space-between;
    background: var(--surface-2);
    border-radius: 10px;
    overflow:hidden;
    border: 1px solid var(--line);
  }
  .qty button{
    background:none; border:none; color:var(--text);
    font-size: 18px; width: 38px; height: 36px; cursor:pointer;
  }
  .qty button:active{ background: var(--bg); }
  .qty .count{
    font-family:'JetBrains Mono', monospace;
    font-size: 14px;
    min-width: 20px;
    text-align:center;
  }

  /* Cart drawer */
  .cart-bar{
    position: fixed; bottom: 0; left:0; right:0;
    background: var(--surface);
    border-top: 1px solid var(--line);
    padding: 14px 20px;
    display:flex; align-items:center; justify-content:space-between;
    gap: 14px;
    z-index: 30;
    transform: translateY(100%);
    transition: transform 0.25s ease;
  }
  .cart-bar.show{ transform: translateY(0); }
  .cart-bar .total{
    font-family:'JetBrains Mono', monospace;
    font-size: 16px;
    color: var(--amber);
  }
  .order-btn{
    background: var(--amber);
    color: #0B0E14;
    border:none;
    font-weight: 700;
    padding: 12px 22px;
    border-radius: 999px;
    font-size: 14px;
    cursor:pointer;
    flex-shrink:0;
  }
  .order-btn:focus-visible{ outline: 2px solid var(--cyan); outline-offset:2px; }

  footer{
    text-align:center;
    color: var(--muted);
    font-size: 12.5px;
    padding: 36px 20px 30px;
    line-height: 1.7;
  }
  footer .pill{
    display:inline-block; margin: 10px 4px 0;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 5px 12px;
    font-family:'JetBrains Mono', monospace;
    font-size: 11.5px;
    color: var(--cyan);
  }
</style>
</head>
<body>

<header>
  <div class="brand">ODD HOURS</div>
  <div class="clock mono" id="clock">--:--:--</div>
  <button class="cart-btn" onclick="document.getElementById('cart-bar').scrollIntoView()">
    🛒 <span class="cart-dot" id="cartCount">0</span>
  </button>
</header>

<section class="hero">
  <h1>ODD HOURS</h1>
  <div class="tag">Lumumba Drive · Order anytime, even 3AM.</div>
  <div class="greeting mono" id="greeting">checking the time...</div>
</section>

<section class="menu">
  <h2>MENU</h2>
  <div class="grid" id="grid"></div>
</section>

<div class="cart-bar" id="cart-bar">
  <div class="total mono" id="cartTotal">KSh 0</div>
  <button class="order-btn" id="orderBtn">Send Order on WhatsApp</button>
</div>

<footer>
  Odd Hours · Lumumba Drive, Nairobi<br>
  Pay cash or M-Pesa on delivery
  <div>
    <span class="pill">📍 Lumumba Drive</span>
    <span class="pill">📞 0116 267 890</span>
  </div>
</footer>

<script>
  const PHONE = "254116267890";

  const items = [
    { id: 1, name: "Chips", price: 100, emoji: "🍟" },
    { id: 2, name: "Sausage", price: 50, emoji: "🌭" },
    { id: 3, name: "Smokies", price: 40, emoji: "🍢" },
    { id: 4, name: "Fish", price: 300, emoji: "🐟" },
    { id: 5, name: "Biriani", price: 100, emoji: "🍛" },
    { id: 6, name: "Samosa", price: 30, emoji: "🥟" },
    { id: 7, name: "Bhajia", price: 70, emoji: "🧅" },
  ];

  const cart = {}; // id -> qty

  function renderMenu(){
    const grid = document.getElementById('grid');
    grid.innerHTML = items.map(i => `
      <div class="card">
        <div class="emoji">${i.emoji}</div>
        <div class="name">${i.name}</div>
        <div class="price mono">KSh ${i.price}</div>
        <div class="qty">
          <button aria-label="Remove ${i.name}" onclick="changeQty(${i.id}, -1)">−</button>
          <span class="count mono" id="count-${i.id}">0</span>
          <button aria-label="Add ${i.name}" onclick="changeQty(${i.id}, 1)">+</button>
        </div>
      </div>
    `).join('');
  }

  function changeQty(id, delta){
    cart[id] = Math.max(0, (cart[id] || 0) + delta);
    document.getElementById('count-' + id).textContent = cart[id];
    updateCartBar();
  }

  function updateCartBar(){
    let count = 0, total = 0;
    for (const id in cart){
      const item = items.find(i => i.id == id);
      count += cart[id];
      total += cart[id] * item.price;
    }
    document.getElementById('cartCount').textContent = count;
    document.getElementById('cartTotal').textContent = 'KSh ' + total;
    document.getElementById('cart-bar').classList.toggle('show', count > 0);
  }

  document.getElementById('orderBtn').addEventListener('click', () => {
    let lines = [];
    let total = 0;
    for (const id in cart){
      if (cart[id] > 0){
        const item = items.find(i => i.id == id);
        lines.push(`${cart[id]} x ${item.name} - KSh ${cart[id]*item.price}`);
        total += cart[id]*item.price;
      }
    }
    if (lines.length === 0) return;
    const msg = `Hello Odd Hours! I'd like to order:\n${lines.join('\n')}\n\nTotal: KSh ${total}\n\nDelivery address: \nPayment: Cash / M-Pesa on delivery`;
    window.open(`https://wa.me/${PHONE}?text=${encodeURIComponent(msg)}`, '_blank');
  });

  function updateClockAndGreeting(){
    const now = new Date();
    const h = now.getHours();
    const pad = n => n.toString().padStart(2,'0');
    document.getElementById('clock').textContent = `${pad(h)}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;

    let g;
    if (h >= 5 && h < 12) g = "Good morning — fuel up.";
    else if (h >= 12 && h < 17) g = "Good afternoon — quick bite?";
    else if (h >= 17 && h < 22) g = "Good evening — let's eat.";
    else g = "It's odd hours. We're still cooking.";
    document.getElementById('greeting').textContent = g;
  }

  renderMenu();
  updateClockAndGreeting();
  setInterval(updateClockAndGreeting, 1000);
</script>

</body>
</html>
